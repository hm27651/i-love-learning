name: Public repository safety

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  safety:
    runs-on: windows-latest
    steps:
      - name: Checkout complete history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Reject tracked study data
        run: python tools/check_public_repo.py

      - name: Check Python syntax
        run: python -m py_compile app.py migrations.py import_service.py knowledge_service.py

      - name: Run automated tests
        run: python -m unittest discover -s tests -v
