name: Windows Portable package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r packaging/windows/requirements-portable.txt

      - name: Reject tracked study data
        run: python tools/safety/check_public_repo.py

      - name: Run automated tests
        run: python -m unittest discover -s tests -v

      - name: Build Portable package
        shell: pwsh
        run: ./tools/release/windows/build_portable_windows.ps1 -Python python

      - name: Verify package has no bundled database
        shell: pwsh
        run: |
          $packageDir = "build/portable-staging/I-Love-Learning-Portable"
          if (Test-Path "$packageDir/data/h3cse.db") {
            throw "Portable package must not contain a prebuilt database"
          }
          $dataArtifacts = @()
          if (Test-Path "$packageDir/data") {
            $dataArtifacts += Get-ChildItem -Path "$packageDir/data" -Recurse -File -Include *.pdf,*.vce,*.doc,*.docx,*.xls,*.xlsx,*.csv,*.db,*.sqlite,*.sqlite3
          }
          $dataArtifacts += Get-ChildItem -Path $packageDir -File -Include *.pdf,*.vce,*.doc,*.docx,*.xls,*.xlsx,*.csv,*.db,*.sqlite,*.sqlite3
          if ($dataArtifacts) {
            $dataArtifacts | Select-Object FullName
            throw "Portable package contains a protected data artifact"
          }

      - name: Smoke test Portable executable
        shell: pwsh
        run: ./tools/release/windows/smoke_portable_windows.ps1 -Python python

      - name: Upload Portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: I-Love-Learning-Portable
          path: |
            dist/I-Love-Learning-Portable.zip
            dist/I-Love-Learning-Portable.zip.sha256
          if-no-files-found: error
