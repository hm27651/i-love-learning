{% extends 'base.html' %}{% block title %}{{ '编辑' if item else '新增' }}{{ task_alias }} · I Love Learning{% endblock %}{% block content %}
<div class="page-head"><div><h1>{{ '编辑' if item else '新增' }}{{ task_alias }}</h1><div class="lead">写清目标、关键步骤与验证信号，避免只记录“做过”。</div></div></div>
<form method="post" enctype="multipart/form-data" class="card form-grid"><div class="field"><label>章节</label><select name="chapter_id">{% for c in chapters %}<option value="{{ c.id }}" {% if item and item.chapter_id==c.id %}selected{% endif %}>{{ c.subject_name }} / {{ c.name }}</option>{% endfor %}</select></div><div class="field"><label>标题</label><input name="title" required value="{{ item.title if item else '' }}"></div><div class="field full"><label>实践目标</label><textarea name="objective">{{ item.objective if item else '' }}</textarea></div><div class="field"><label>拓扑或项目文件路径</label><input name="topology_file_path" value="{{ item.topology_file_path if item else '' }}"></div><div class="field"><label>计划日期</label><input type="date" name="due_date" value="{{ item.due_date if item and item.due_date else '' }}"></div><div class="field full"><label>关键命令或步骤</label><textarea name="commands">{{ item.commands if item else '' }}</textarea></div><div class="field full"><label>验证步骤与预期信号</label><textarea name="verification">{{ item.verification if item else '' }}</textarea></div><div class="field full"><label>实际结果与复盘</label><textarea name="result">{{ item.result if item else '' }}</textarea></div><div class="field"><label>状态</label><select name="status">{% for k,v in {'planned':'计划中','doing':'进行中','completed':'已完成'}.items() %}<option value="{{ k }}" {% if item and item.status==k %}selected{% endif %}>{{ v }}</option>{% endfor %}</select></div><div class="field"><label>拓扑图/结果截图</label><input type="file" name="image" accept="image/png,image/jpeg,image/gif,image/webp"></div>{% if item and item.image_path %}<div class="field full"><img class="question-image" src="{{ url_for('upload',name=item.image_path) }}"></div>{% endif %}<div class="field full actions"><button>保存记录</button><a class="button secondary" href="{{ url_for('labs') }}">取消</a></div></form>
{% endblock %}
